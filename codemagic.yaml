workflows:
  flutter-android-debug:
    name: OxDigital Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_app
    environment:
      flutter: stable
      vars:
        API_URL: "http://10.0.2.2:4100"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze Flutter project
        script: flutter analyze
      - name: Build debug APK
        script: flutter build apk --debug --dart-define=API_URL=$API_URL
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/app/outputs/logs/*.log

  flutter-android-release:
    name: OxDigital Android Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_app
    environment:
      flutter: stable
      vars:
        API_URL: "https://your-api-domain.com"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze Flutter project
        script: flutter analyze
      - name: Build release APK
        script: flutter build apk --release --dart-define=API_URL=$API_URL
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/logs/*.log
