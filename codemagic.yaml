workflows:
  flutter-android-debug:
    name: OxDigital Android Debug Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_app
    environment:
      flutter: stable
      vars:
        API_URL: "https://your-api-domain.com"
    scripts:
      - name: Prepare Android project
        script: |
          set -e
          rm -rf test
          rm -f android/settings.gradle.kts android/build.gradle.kts android/app/build.gradle.kts
          rm -rf android/app/src/main/kotlin
          mkdir -p android/app/src/main/java/com/oxdigital/scheduler
          cat > android/app/src/main/java/com/oxdigital/scheduler/MainActivity.java <<'EOF'
          package com.oxdigital.scheduler;

          import io.flutter.embedding.android.FlutterActivity;

          public class MainActivity extends FlutterActivity {
          }
          EOF
          FLUTTER_SDK="${FLUTTER_ROOT:-$(dirname "$(dirname "$(which flutter)")")}"
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          perl -0pi -e 's/id "com\.android\.application" version "[^"]*"/id "com.android.application" version "8.6.0"/g' android/settings.gradle
          perl -0pi -e 's/\n\s*id "org\.jetbrains\.kotlin\.android" version "[^"]*" apply false//g' android/settings.gradle
          perl -0pi -e 's/\n\s*id "kotlin-android"//g' android/app/build.gradle
          perl -0pi -e 's/\n\s*kotlinOptions\s*\{[^{}]*\}//g' android/app/build.gradle
          if ! grep -q "buildTypes" android/app/build.gradle; then
            perl -0pi -e 's/(\n\s*defaultConfig\s*\{[^{}]*\n\s*\})/$1\n\n    buildTypes {\n        debug {\n            signingConfig signingConfigs.debug\n        }\n        release {\n            signingConfig signingConfigs.debug\n            minifyEnabled false\n            shrinkResources false\n        }\n    }/s' android/app/build.gradle
          fi
          printf 'org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError\nandroid.useAndroidX=true\nandroid.enableJetifier=true\nandroid.newDsl=false\n' > android/gradle.properties
          echo "----- android/settings.gradle -----"
          cat android/settings.gradle
          echo "----- checking for unsupported files/versions -----"
          if find android -name '*.kts' | grep .; then echo "KTS Gradle files must not exist"; exit 1; fi
          if find android/app/src/main/kotlin -type f 2>/dev/null | grep .; then echo "Kotlin source files must not exist"; exit 1; fi
          if grep -R "8.3.2" android; then echo "Old AGP 8.3.2 still exists"; exit 1; fi
          flutter clean
      - name: Get packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze lib android pubspec.yaml --no-fatal-infos --no-fatal-warnings
      - name: Build debug APK
        script: |
          rm -rf android/app/src/main/kotlin
          flutter build apk --debug --android-skip-build-dependency-validation --dart-define=API_URL=$API_URL
      - name: Build release APK
        script: |
          rm -rf android/app/src/main/kotlin
          flutter build apk --release --android-skip-build-dependency-validation --dart-define=API_URL=$API_URL
      - name: Build release AAB
        script: |
          rm -rf android/app/src/main/kotlin
          flutter build appbundle --release --android-skip-build-dependency-validation --dart-define=API_URL=$API_URL
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/logs/*.log

